version: '3.8'

services:
  app:
    build: 
      context: .
      dockerfile: Dockerfile
    volumes:
      - ../:/workspace:cached
      - /workspace/node_modules
      - /workspace/.next
    # ทำให้ Container รันค้างไว้รอ VS Code เข้ามาเชื่อมต่อ
    command: sleep infinity
    environment:
      # ตรงกับ .env ของคุณพอดี
      - DATABASE_URL=postgresql://postgres:1234@db:5432/mythoria_db
      - LOCAL_DATABASE_URL=postgresql://postgres:1234@db:5432/mythoria_db
      - PYTHON_SERVICE_URL=http://python-service:8000
      - WATCHPACK_POLLING=true
      - CHOKIDAR_USEPOLLING=true
    
  python-service:
    build:
      context: ../
      dockerfile: .devcontainer/Dockerfile.python
    volumes:
      - ../pythonservice:/workspace/pythonservice:cached
    ports:
      - "8000:8000"
    env_file:
      - ../.env
    environment:
      - NEXT_PUBLIC_BASE_URL=http://app:3000
    restart: unless-stopped

  db:
    image: postgres:15
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1234
      POSTGRES_DB: mythoria_db
    volumes:
      # สร้าง Volume เก็บข้อมูลไว้ เผื่อปิด Container ข้อมูลจะได้ไม่หาย
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:
