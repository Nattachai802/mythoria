version: '3.8'

services:
  app:
    build: 
      context: .
      dockerfile: Dockerfile
    volumes:
      - ../:/workspace:cached
    # ทำให้ Container รันค้างไว้รอ VS Code เข้ามาเชื่อมต่อ
    command: sleep infinity
    environment:
      # ตรงกับ .env ของคุณพอดี
      - DATABASE_URL=postgresql://postgres:1234@localhost:5432/mythoria_db
    
  db:
    image: postgres:15
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1234
      POSTGRES_DB: mythoria_db
    volumes:
      # สร้าง Volume เก็บข้อมูลไว้ เผื่อปิด Container ข้อมูลจะได้ไม่หาย
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:
